version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: jobtracker-db
    environment:
      POSTGRES_DB: jobdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: jobtracker-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres